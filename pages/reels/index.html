<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reels - Introstagram</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../static/css/style.css" />
    <link rel="stylesheet" href="../static/css/layout.css" />
    <link rel="stylesheet" href="../static/css/reels.css" />
  </head>
  <body class="reels-body">
    <main class="app-device-frame reels-frame" aria-label="Reels page">
      <section class="reels-stage" aria-label="Reels content">
        <video
          class="reels-video"
          src="../static/video/reels-1.mp4"
          autoplay
          loop
          playsinline
          aria-label="Reels video"
        ></video>
        <button
          class="reels-sound-button"
          type="button"
          data-reels-sound
          hidden
          aria-label="Turn sound on"
        >
          <span class="reels-sound-icon"></span>
        </button>

        <header class="reels-header">
          <h1>Reels</h1>
          <a class="icon-button" href="../../index.html" aria-label="Camera">
          </a>
        </header>

        <aside class="reels-actions" aria-label="Reels actions">
          <button
            type="button"
            class="reels-like-button"
            aria-label="Like"
            aria-pressed="false"
            data-reels-like-button
          >
            <span class="comment-like-icon"></span>
            <small data-reels-likes>10K</small>
          </button>
          <!-- <button type="button" aria-label="Comment">
            <span class="icon comment"></span>
            <small></small>
          </button>
          <button type="button" aria-label="Share">
            <span class="icon send"></span>
          </button>
          <button type="button" aria-label="More">
            <span class="reels-more-icon"></span>
          </button> -->
          <span class="reels-audio-tile" aria-hidden="true"></span>
        </aside>

        <section class="reels-copy" aria-label="Reels description">
          <div class="reels-user-row">
            <img
              class="reels-avatar"
              src="../static/img/introstagram_avatar.webp"
              alt=""
            />
            <strong>introstagram team</strong>
          </div>
          <p>KOSA 교육생 김햄찌 VLOG 1편</p>
        </section>
      </section>

      <nav
        class="app-layout-footer bottom-nav reels-bottom-nav"
        aria-label="Main navigation"
      >
        <a href="../../index.html" aria-label="Home"
          ><span class="icon home"></span
        ></a>
        <a class="active" href="./index.html" aria-label="Reels"
          ><span class="icon play-square"></span
        ></a>
        <a href="../directmessage/index.html" aria-label="Direct messages"
          ><span class="icon paper-plane-notification"></span
        ></a>
        <a href="../location/index.html" aria-label="Activity">
          <span class="icon search"></span>
        </a>
        <a href="../profile/index.html" aria-label="Profile"
          ><img
            class="nav-profile-avatar"
            src="../static/img/introstagram_avatar.webp"
            alt=""
        /></a>
      </nav>
    </main>
    <script src="../static/js/reels-player.js"></script>
  </body>
</html>
