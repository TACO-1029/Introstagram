<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story - Introstagram</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../static/css/style.css" />
  </head>
  <body class="story-editor-body">
    <main class="story-editor" aria-label="Story drawing editor">
      <section class="story-canvas-shell" aria-label="Story canvas preview">
        <header class="story-editor-top">
          <a
            class="story-close-button"
            href="../../index.html"
            aria-label="Close story editor"
            >×</a
          >
          <div class="story-author">
            <span class="story-author-avatar"></span>
            <span>introstagram team</span>
          </div>
          <div class="story-tool-icons" aria-label="Story tools">
            <button
              class="story-tool-button active"
              type="button"
              data-tool="pen"
              aria-label="Pen"
            >
              <span class="story-tool-icon story-pen-tool-icon"></span>
            </button>
            <button
              class="story-tool-button"
              type="button"
              data-tool="clear"
              aria-label="Clear"
            >
              <span class="story-tool-icon story-clear-tool-icon"></span>
            </button>
            <button class="story-done-button" type="button" data-save>✓</button>
          </div>
        </header>

        <canvas
          id="storyCanvas"
          width="720"
          height="1280"
          aria-label="Drawable story canvas"
        ></canvas>

        <footer class="story-editor-bottom">
          <div class="story-color-row" aria-label="Drawing colors">
            <button
              class="color-dot active"
              type="button"
              data-color="#ffffff"
              style="--dot-color: #ffffff"
              aria-label="White"
            ></button>
            <button
              class="color-dot"
              type="button"
              data-color="#111111"
              style="--dot-color: #111111"
              aria-label="Black"
            ></button>
            <button
              class="color-dot"
              type="button"
              data-color="#2d9cdb"
              style="--dot-color: #2d9cdb"
              aria-label="Blue"
            ></button>
            <button
              class="color-dot"
              type="button"
              data-color="#6fcf5f"
              style="--dot-color: #6fcf5f"
              aria-label="Green"
            ></button>
            <button
              class="color-dot"
              type="button"
              data-color="#ffd15c"
              style="--dot-color: #ffd15c"
              aria-label="Yellow"
            ></button>
            <button
              class="color-dot"
              type="button"
              data-color="#ff8b3d"
              style="--dot-color: #ff8b3d"
              aria-label="Orange"
            ></button>
            <button
              class="color-dot"
              type="button"
              data-color="#ff4e5e"
              style="--dot-color: #ff4e5e"
              aria-label="Red"
            ></button>
            <button
              class="color-dot"
              type="button"
              data-color="#cf1a74"
              style="--dot-color: #cf1a74"
              aria-label="Pink"
            ></button>
            <button
              class="color-dot"
              type="button"
              data-color="#ab2bd6"
              style="--dot-color: #ab2bd6"
              aria-label="Purple"
            ></button>
          </div>
          <label class="story-size-control">
            <span>Brush</span>
            <input id="brushSize" type="range" min="2" max="34" value="10" />
          </label>
          <div class="story-actions">
            <label class="story-pill-button story-load-button">
              Load image
              <input id="storyEditorImagePicker" type="file" accept="image/*" />
            </label>
            <button class="story-pill-button" type="button" data-save>
              Save image
            </button>
            <a
              class="story-send-button"
              href="../../index.html"
              aria-label="Send story"
              ><span class="icon send"></span
            ></a>
          </div>
        </footer>
      </section>
    </main>

    <script src="../../static/js/story-canvas.js"></script>
  </body>
</html>
