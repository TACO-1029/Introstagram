<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280">
  <defs>
    <pattern id="checker" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#232329" />
      <rect x="32" width="32" height="32" fill="#36363d" />
      <rect y="32" width="32" height="32" fill="#36363d" />
      <rect x="32" y="32" width="32" height="32" fill="#232329" />
    </pattern>
    <linearGradient id="soft-light" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.09" />
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="1" stop-color="#000000" stop-opacity="0.16" />
    </linearGradient>
  </defs>
  <rect width="720" height="1280" fill="url(#checker)" />
  <rect width="720" height="1280" fill="url(#soft-light)" />
</svg>
