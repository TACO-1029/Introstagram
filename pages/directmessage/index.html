<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Direct Message - Introstagram</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../static/css/style.css" />
    <link rel="stylesheet" href="../static/css/layout.css" />
    <link rel="stylesheet" href="../static/css/direct.css" />
  </head>

  <body class="direct-body">
    <main class="app-device-frame direct-app" aria-label="Direct message app">
      <aside class="direct-rail" aria-label="Direct navigation">
        <a
          class="direct-rail-logo"
          href="../../index.html"
          aria-label="Instagram"
        >
          Introstagram
        </a>

        <a href="../../index.html" aria-label="Home">
          <span class="icon home"></span>
          <span class="direct-rail-label">홈</span>
        </a>

        <a href="../reels/index.html" aria-label="Reels">
          <span class="icon play-square"></span>
          <span class="direct-rail-label">릴스</span>
        </a>

        <a class="active" href="./index.html" aria-label="Direct messages">
          <span class="icon paper-plane-notification"></span>
          <span class="direct-rail-label">메시지</span>
        </a>

        <a href="../location.html" aria-label="Search">
          <span class="icon search"></span>
          <span class="direct-rail-label">알림</span>
        </a>

        <a
          class="direct-rail-avatar"
          href="../profile/index.html"
          aria-label="Profile"
        >
          <img src="../static/img/introstagram_avatar.webp" alt="" />
          <span class="direct-rail-label">프로필</span>
        </a>

        <span class="direct-rail-spacer"></span>
      </aside>

      <section class="direct-inbox" aria-label="Inbox">
        <header class="direct-inbox-header">
          <span
            class="icon camera direct-mobile-logo"
            aria-hidden="true"
          ></span>
          <h1>instrogram team</h1>
        </header>

        <section class="direct-search" role="search">
          <span class="icon search"></span>
          <span>검색</span>
        </section>

        <section class="direct-shortcuts" aria-label="Direct message shortcuts">
          <a class="direct-shortcut" href="#">
            <span class="direct-bubble direct-music-bubble">
              <button
                class="direct-music-play"
                type="button"
                aria-label="음원 재생"
                data-music-play
              >
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </button>

              <span class="direct-music-copy">
                <strong>더현대 서울</strong>
                <small>Full ver. (Song by Zion. T)</small>
              </span>

              <audio
                src="../static/music/thehyundai-seoul.mp3"
                data-music-audio
                loop
              ></audio>
            </span>

            <span class="direct-shortcut-avatar">
              <img src="../static/img/introstagram_avatar.webp" alt="" />
            </span>

            <strong>내 메모</strong>
          </a>
        </section>

        <section class="direct-section-title">
          <h2>메시지</h2>
          <a href="#">요청</a>
        </section>

        <section class="direct-list" aria-label="Message list">
          <a class="direct-thread unread" href="#" data-direct-thread-open>
            <span class="direct-avatar photo-a"></span>
            <span class="direct-thread-copy">
              <strong>현대퓨처넷</strong>
              <small>메시지를 좋아합니다 · 1시간</small>
            </span>
            <span class="direct-unread-dot"></span>
          </a>
        </section>
      </section>

      <section
        id="directChatRoot"
        class="direct-chat"
        aria-label="Message conversation"
      ></section>

      <nav
        class="bottom-nav direct-bottom-nav"
        aria-label="Direct message navigation"
      >
        <a href="../../index.html" aria-label="Home">
          <span class="icon home"></span>
        </a>

        <a href="../reels/index.html" aria-label="Reels">
          <span class="icon play-square"></span>
        </a>

        <a class="active" href="./index.html" aria-label="Direct messages">
          <span class="icon paper-plane-notification"></span>
        </a>

        <a href="#" aria-label="Search">
          <span class="icon search"></span>
        </a>

        <a href="../profile/index.html" aria-label="Profile">
          <span class="direct-nav-avatar">
            <img src="../static/img/introstagram_avatar.webp" alt="" />
          </span>
        </a>
      </nav>
    </main>

    <script src="../static/js/direct-chat-component.js"></script>

    <script>
      const playButton = document.querySelector("[data-music-play]");
      const audio = document.querySelector("[data-music-audio]");

      function updateMusicState(isPlaying) {
        playButton?.classList.toggle("is-playing", isPlaying);
        playButton?.setAttribute(
          "aria-label",
          isPlaying ? "음원 일시정지" : "음원 재생",
        );
      }

      async function playMusic() {
        if (!audio) return;

        try {
          await audio.play();
          updateMusicState(true);
        } catch (error) {
          updateMusicState(false);
          console.warn("브라우저 정책으로 자동 재생이 차단되었습니다.", error);
        }
      }

      function pauseMusic() {
        if (!audio) return;

        audio.pause();
        updateMusicState(false);
      }

      window.addEventListener("DOMContentLoaded", () => {
        playMusic();
      });

      playButton?.addEventListener("click", (event) => {
        event.preventDefault();

        if (!audio) return;

        if (audio.paused) {
          playMusic();
        } else {
          pauseMusic();
        }
      });

      document.addEventListener(
        "click",
        () => {
          if (audio?.paused) {
            playMusic();
          }
        },
        { once: true },
      );
    </script>
  </body>
</html>
