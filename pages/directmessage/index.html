<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Direct Message - Introstagram</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../static/css/style.css" />
    <link rel="stylesheet" href="../static/css/layout.css" />
  </head>
  <body class="direct-body">
    <main class="app-device-frame direct-app" aria-label="Direct message app">
      <aside class="direct-rail" aria-label="Direct navigation">
        <a href="../../index.html" aria-label="Instagram"
          ><span class="icon camera"></span
        ></a>
        <a href="../../index.html" aria-label="Home"
          ><span class="icon home"></span
        ></a>
        <a href="#" aria-label="Reels"
          ><span class="icon play-square"></span
        ></a>
        <a class="active" href="./index.html" aria-label="Direct messages"
          ><span class="icon paper-plane-notification"></span
        ></a>
        <a href="#" aria-label="Search"><span class="icon search"></span></a>
        <a
          class="direct-rail-avatar"
          href="../../index.html"
          aria-label="Profile"
          ><img src="../static/img/my-story-avatar.svg" alt=""
        /></a>
        <span class="direct-rail-spacer"></span>
        <button type="button" aria-label="More">
          <span class="menu-lines"></span>
        </button>
        <button type="button" aria-label="Grid">
          <span class="grid-icon"></span>
        </button>
      </aside>

      <section class="direct-inbox" aria-label="Inbox">
        <header class="direct-inbox-header">
          <span
            class="icon camera direct-mobile-logo"
            aria-hidden="true"
          ></span>
          <h1>현대퓨처넷</h1>
        </header>

        <section class="direct-search" role="search">
          <span class="icon search"></span>
          <span>검색</span>
        </section>

        <section class="direct-shortcuts" aria-label="Direct message shortcuts">
          <a class="direct-shortcut" href="#">
            <span class="direct-bubble">새 소식...</span>
            <span class="direct-shortcut-avatar">
              <!-- pages/static/img/introstagram_avatar.png -->
              <img src="../static/img/introstagram_avatar.png" alt="" />
            </span>
            <strong>내 메모</strong>
          </a>
        </section>

        <section class="direct-section-title">
          <h2>메시지</h2>
          <a href="#">요청</a>
        </section>

        <section class="direct-list" aria-label="Message list">
          <a class="direct-thread unread" href="#" data-direct-thread-open>
            <span class="direct-avatar photo-a"></span>
            <span class="direct-thread-copy">
              <strong>현대퓨처넷</strong>
              <small>메시지를 좋아합니다 · 1시간</small>
            </span>
            <span class="direct-unread-dot"></span>
          </a>
        </section>
      </section>

      <section
        id="directChatRoot"
        class="direct-chat"
        aria-label="Message conversation"
      ></section>

      <nav
        class="bottom-nav direct-bottom-nav"
        aria-label="Direct message navigation"
      >
        <a href="../../index.html" aria-label="Home"
          ><span class="icon home"></span
        ></a>
        <a href="#" aria-label="Reels"
          ><span class="icon play-square"></span
        ></a>
        <a class="active" href="./index.html" aria-label="Direct messages"
          ><span class="icon paper-plane-notification"></span
        ></a>
        <a href="#" aria-label="Search"><span class="icon search"></span></a>
        <a href="../../index.html" aria-label="Profile"
          ><span class="direct-nav-avatar"
            ><img src="../static/img/my-story-avatar.svg" alt="" /></span
        ></a>
      </nav>
    </main>
    <script src="../static/js/direct-chat-component.js"></script>
  </body>
</html>
