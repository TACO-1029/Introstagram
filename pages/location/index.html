<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Location</title>

    <link rel="stylesheet" href="../static/css/style.css" />
    <link rel="stylesheet" href="../static/css/layout.css" />
  </head>
  <body class="location-body">
    <main class="app-shell location-shell">
      <section class="app-device-frame location-frame">
        <header class="location-header">
          <a class="icon-button" href="../../index.html" aria-label="Go back">
            <span class="icon camera"></span>
          </a>
          <h1>Location</h1>
          <span class="location-header-spacer"></span>
        </header>

        <section class="location-content">
          <div id="map" class="location-map"></div>
        </section>
      </section>
    </main>

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=86f22b2d15e49eda57e3d7cc5ad5b81e&autoload=false"></script>

    <script>
      kakao.maps.load(function () {
        const mapContainer = document.getElementById("map");

        const mapOption = {
          center: new kakao.maps.LatLng(37.495918, 127.12454),
          level: 3,
        };

        const map = new kakao.maps.Map(mapContainer, mapOption);
        const mapCenter = mapOption.center;

        function syncMapLayout() {
          map.relayout();
          map.setCenter(mapCenter);
        }

        setTimeout(syncMapLayout, 300);
        window.addEventListener("resize", syncMapLayout);

        if ("ResizeObserver" in window) {
          const resizeObserver = new ResizeObserver(syncMapLayout);
          resizeObserver.observe(mapContainer);
        }
      });
    </script>
  </body>
</html>
