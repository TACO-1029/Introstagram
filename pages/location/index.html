<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Location</title>

    <link rel="stylesheet" href="../static/css/style.css" />
    <link rel="stylesheet" href="../static/css/layout.css" />
    <link rel="stylesheet" href="../static/css/location.css" />
  </head>
  <body class="location-body">
    <main class="app-shell location-shell">
      <section class="app-device-frame location-frame">
        <header class="location-header">
          <a class="icon-button" href="../../index.html" aria-label="Go back">
            <span class="icon camera"></span>
          </a>
          <h1>Location</h1>
          <span class="location-header-spacer"></span>
        </header>

        <section class="location-content">
          <div class="location-map-shell">
            <nav
              id="locationToggleBar"
              class="location-toggle-bar"
              aria-label="Location quick view"
            ></nav>
            <div id="map" class="location-map">
              <span class="location-map-loading">지도를 불러오는 중...</span>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=86f22b2d15e49eda57e3d7cc5ad5b81e&autoload=false&libraries=services"></script>

    <script src="../static/js/location-map.js"></script>
  </body>
</html>
