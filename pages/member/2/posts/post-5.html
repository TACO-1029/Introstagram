<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>김철용 게시글 5 - Introstagram</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../../../static/css/style.css" />
  </head>
  <body class="member-post-body"
    data-comment-avatar-src="../../../../static/img/introstagram_avatar.webp"
  >
    <main class="member-post-page">
      <a class="member-post-back" href="../index.html">‹ 프로필로 돌아가기</a>
      <article class="post-card member-post-card">
        <div id="postHeaderRoot"></div>
        <div id="postVisualRoot"></div>
        <section class="post-actions" aria-label="Post actions">
          <div class="action-group">
            <button class="icon-button" aria-label="Like"><span class="comment-like-icon"></span></button>
            <button class="icon-button" type="button" aria-label="Comment"
              data-comments-open
              data-comments-key="kimcheolyong-post-5"
              data-comments-preview-image="../../../../static/img/member-2/posts/post-5-1.webp"
            ><span class="icon comment"></span></button>
            <button class="icon-button" aria-label="Share"><span class="icon send"></span></button>
          </div>
          <div id="postPaginationRoot" class="pagination-dots" aria-hidden="true"></div>
          <button class="icon-button" aria-label="Save"><span class="icon bookmark"></span></button>
        </section>
        <section class="caption">
          <p data-post-caption></p>
          <button type="button" data-comments-label
            aria-label="Comment"
            data-comments-open
            data-comments-key="kimcheolyong-post-5"
            data-comments-preview-image="../../../../static/img/member-2/posts/post-5-1.webp"
            data-comments-count-label
          >댓글 1개 모두 보기</button>
        </section>
      </article>
    </main>
    <script>
      window.introstagramPostData = {
        user: {
          name: "kimcheolyong",
          meta: "김철용",
          avatar: "../../../../static/img/member-2/profile/kimcheolyong-profile.webp",
        },
        caption: "크리스마스",
        commentsLabel: "댓글 1개 모두 보기",
        slides: [
          { image: "../../../../static/img/member-2/posts/post-5-1.webp", fallback: "../../../../static/img/post-slide-1.svg" },
        ],
      };
    </script>
    <script src="../../../../static/js/post-components.js"></script>
    <script src="../../../../static/js/comments-sheet-component.js"></script>
    <script src="../../../../static/js/comments-sheet.js"></script>
  </body>
</html>
