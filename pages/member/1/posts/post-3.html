<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>도건우 게시글 3 - Introstagram</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../../static/css/style.css" />
  </head>
  <body class="member-post-body">
    <main class="member-post-page">
      <a class="member-post-back" href="../index.html">‹ 프로필로 돌아가기</a>
      <article class="post-card member-post-card">
        <div id="postHeaderRoot"></div>
        <div id="postVisualRoot"></div>
        <section class="post-actions" aria-label="Post actions">
          <div class="action-group">
            <button class="icon-button" aria-label="Like"><span class="comment-like-icon"></span></button>
            <button class="icon-button" type="button" aria-label="Comment"><span class="icon comment"></span></button>
            <button class="icon-button" aria-label="Share"><span class="icon send"></span></button>
          </div>
          <div id="postPaginationRoot" class="pagination-dots" aria-hidden="true"></div>
          <button class="icon-button" aria-label="Save"><span class="icon bookmark"></span></button>
        </section>
        <section class="caption">
          <p data-post-caption></p>
          <button type="button" data-comments-label>댓글 1개 모두 보기</button>
        </section>
      </article>
    </main>
    <script>
      window.introstagramPostData = {
        user: { name: "dogeonwoo", meta: "도건우", avatar: "../../../static/img/member-1/profile/dogeonwoo-profile.webp" },
        caption: "제주도에서 먹은 흑돼지 만두.. 정작 돼지고기는 일반품종이었다.",
        commentsLabel: "댓글 1개 모두 보기",
        slides: [
          { image: "../../../static/img/member-1/posts/post-3-1.webp", fallback: "../../../static/img/post-slide-1.svg" },
        ],
      };
    </script>
    <script src="../../../static/js/post-components.js"></script>
  </body>
</html>
