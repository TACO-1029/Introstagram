    <main class="member-page" aria-label="도건우 profile">
      <header class="mobile-profile-bar">
        <a
          class="icon-button"
          href="../../../index.html"
          aria-label="Go to main page"
          ><span class="icon home"></span
        ></a>
        <strong>dogeonwoo</strong>
        <button class="icon-button" aria-label="Menu">
          <span class="menu-lines"></span>
        </button>
      </header>

      <section class="profile-hero">
        <button
          class="profile-photo photo-profile"
          type="button"
          data-highlight="profile"
          aria-label="도건우 스토리 보기"
        >
          <img
            src="../../static/img/member-1/profile/dogeonwoo-profile.webp"
            alt="도건우 프로필 사진"
          />
        </button>
        <div class="profile-info">
          <div class="profile-title-row">
            <h1>dogeonwoo</h1>
          </div>
          <dl class="profile-stats">
            <div>
              <dt>게시물</dt>
              <dd>6</dd>
            </div>

            <div
              class="account-profile-stat-trigger"
              role="button"
              tabindex="0"
              data-profile-connections-open="followers"
              aria-label="팔로워 목록 보기"
            >
              <dt>팔로워</dt>
              <dd>4</dd>
            </div>

            <div
              class="account-profile-stat-trigger"
              role="button"
              tabindex="0"
              data-profile-connections-open="following"
              aria-label="팔로잉 목록 보기"
            >
              <dt>팔로잉</dt>
              <dd>4</dd>
            </div>
          </dl>
          <div class="profile-bio">
            <strong>도건우</strong>
            <span>자연과 동물을 좋아합니다.</span>
            <a href="../../../index.html">introstagram.dev/dogeonwoo</a>
          </div>
        </div>
      </section>

      <section class="mobile-actions" aria-label="Mobile profile actions">
        <button class="btn btn-light profile-button" type="button">
          Following
        </button>
        <button class="btn btn-light profile-button" type="button">
          Message
        </button>
        <button class="btn btn-light square-button" type="button">⌄</button>
      </section>

      <nav class="highlight-list" aria-label="Profile highlights">
        <button class="highlight-item" type="button" data-highlight="project">
          <span
            class="highlight-cover"
            style="
              --highlight-image: url(&quot;../../static/img/member-1/highlights/project-1.webp&quot;);
            "
          ></span>
          <span>Project</span>
        </button>
        <button class="highlight-item" type="button" data-highlight="about">
          <span
            class="highlight-cover"
            style="
              --highlight-image: url(&quot;../../static/img/member-1/highlights/about-1.webp&quot;);
            "
          ></span>
          <span>About</span>
        </button>
        <button class="highlight-item" type="button" data-highlight="like">
          <span
            class="highlight-cover"
            style="
              --highlight-image: url(&quot;../../static/img/member-1/highlights/like-1.webp&quot;);
            "
          ></span>
          <span>Like</span>
        </button>
      </nav>

      <nav class="profile-tabs" aria-label="Profile content tabs">
        <a class="active" href="#"
          ><span class="grid-icon"></span><span>게시물</span></a
        >
      </nav>

      <section class="post-grid" aria-label="도건우 posts">
        <a
          class="grid-tile post-template"
          href="./posts/post-1.html"
          style="
            --post-image: url(&quot;../../static/img/member-1/posts/post-1-1.webp&quot;);
          "
        ></a>
        <a
          class="grid-tile post-template"
          href="./posts/post-2.html"
          style="
            --post-image: url(&quot;../../static/img/member-1/posts/post-2-1.webp&quot;);
          "
        ></a>
        <a
          class="grid-tile post-template"
          href="./posts/post-3.html"
          style="
            --post-image: url(&quot;../../static/img/member-1/posts/post-3-1.webp&quot;);
          "
        ></a>
        <a
          class="grid-tile post-template"
          href="./posts/post-4.html"
          style="
            --post-image: url(&quot;../../static/img/member-1/posts/post-4-1.webp&quot;);
          "
        ></a>
        <a
          class="grid-tile post-template"
          href="./posts/post-5.html"
          style="
            --post-image: url(&quot;../../static/img/member-1/posts/post-5-1.webp&quot;);
          "
        ></a>
        <a
          class="grid-tile post-template"
          href="./posts/post-6.html"
          style="
            --post-image: url(&quot;../../static/img/member-1/posts/post-6-1.webp&quot;);
          "
        ></a>
      </section>

      <section
        class="story-viewer"
        id="storyViewer"
        aria-label="Story highlight viewer"
        aria-hidden="true"
      >
        <button
          class="story-nav-button story-nav-prev"
          type="button"
          aria-label="Previous story"
          hidden
        >
          <span class="slide-button-icon slide-prev-icon"></span>
        </button>
        <button
          class="story-nav-button story-nav-next"
          type="button"
          aria-label="Next story"
          hidden
        >
          <span class="slide-button-icon slide-next-icon"></span>
        </button>
        <div class="story-viewer-panel">
          <button class="story-close" type="button" aria-label="Close story">
            ×
          </button>
          <div class="story-progress" aria-hidden="true"></div>
          <div class="story-viewer-header">
            <span class="story-viewer-avatar">
              <img
                src="../../static/img/member-1/profile/dogeonwoo-profile.webp"
                alt=""
              />
            </span>
            <strong>dogeonwoo</strong>
          </div>
          <div class="story-viewer-image" role="img" aria-label=""></div>
          <div class="story-viewer-copy">
            <strong></strong>
            <p></p>
          </div>
        </div>
      </section>

      <section
        class="account-connections-modal"
        data-profile-connections-modal
        aria-hidden="true"
      >
        <div
          class="account-connections-backdrop"
          data-profile-connections-close
        ></div>

        <section
          class="account-connections-panel"
          role="dialog"
          aria-modal="true"
          aria-labelledby="accountConnectionsTitle"
        >
          <header class="account-connections-header">
            <span></span>
            <h2 id="accountConnectionsTitle">팔로워</h2>
            <button
              class="account-connections-close"
              type="button"
              data-profile-connections-close
              aria-label="닫기"
            >
              ×
            </button>
          </header>

          <label class="account-connections-search">
            <span class="icon search" aria-hidden="true"></span>
            <input
              type="search"
              placeholder="검색"
              data-profile-connections-search
            />
          </label>

          <section
            class="account-connections-list"
            data-profile-connections-list
            aria-label="Member list"
          ></section>
        </section>
      </section>

      <nav class="bottom-nav member-bottom-nav" aria-label="Mobile navigation">
        <a href="../../../index.html" aria-label="Home"
          ><span class="icon home"></span
        ></a>
        <a href="../../reels/index.html" aria-label="Reels"
          ><span class="icon play-square"></span
        ></a>
        <a href="#" aria-label="Create"

        <a href="#" aria-label="Activity"><span class="icon search"></span></a>
        <a href="../../profile/index.html" aria-label="Profile"
          ><img
            class="nav-profile-avatar"
            src="../../static/img/introstagram_avatar.webp"
            alt=""
          />
          ></a
        >
      </nav>
