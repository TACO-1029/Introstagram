    <script>
      const highlightStories = {
        project: [
          {
            title: "Blinker",
            text: "",
            image: "../../static/img/member-1/highlights/project-1.jpg",
          },
          {
            title: "Eye-ON",
            text: "",
            image: "../../static/img/member-1/highlights/project-2.jpg",
          },
          {
            title: "Run-Dual",
            text: "",
            image: "../../static/img/member-1/highlights/project-3.jpg",
          },
        ],
        about: [
          {
            title: "About",
            text: "",
            image: "../../static/img/member-1/highlights/about-1.jpg",
          },
          {
            title: "About",
            text: "",
            image: "../../static/img/member-1/highlights/about-2.jpg",
          },
          {
            title: "About",
            text: "",
            image: "../../static/img/member-1/highlights/about-3.jpg",
          },
        ],
        like: [
          {
            title: "Like 1",
            text: "",
            image: "../../static/img/member-1/highlights/like-1.jpg",
          },
          {
            title: "Like 2",
            text: "",
            image: "../../static/img/member-1/highlights/like-2.jpg",
          },
          {
            title: "Like 3",
            text: "",
            image: "../../static/img/member-1/highlights/like-3.jpg",
          },
        ],
      };

      const viewer = document.querySelector("#storyViewer");
      const viewerImage = viewer.querySelector(".story-viewer-image");
      const viewerTitle = viewer.querySelector(".story-viewer-copy strong");
      const viewerText = viewer.querySelector(".story-viewer-copy p");
      const progressBars = Array.from(viewer.querySelectorAll(".story-progress span"));
      let storyTimer = null;
      let activeStories = [];
      let activeStoryIndex = 0;

      function renderStory() {
        const story = activeStories[activeStoryIndex];
        viewerImage.style.setProperty("--story-image", `url('${story.image}')`);
        viewerImage.setAttribute("aria-label", story.title);
        viewerTitle.textContent = "";
        viewerText.textContent = "";
        progressBars.forEach((bar, index) => {
          bar.classList.toggle("done", index < activeStoryIndex);
          bar.classList.toggle("active", index === activeStoryIndex);
        });
      }

      function startStory(highlightName) {
        activeStories = highlightStories[highlightName] || [];
        activeStoryIndex = 0;
        if (!activeStories.length) return;
        viewer.setAttribute("aria-hidden", "false");
        renderStory();
        clearInterval(storyTimer);
        storyTimer = setInterval(() => {
          activeStoryIndex += 1;
          if (activeStoryIndex >= activeStories.length) {
            closeStory();
            return;
          }
          renderStory();
        }, 5000);
      }

      function closeStory() {
        viewer.setAttribute("aria-hidden", "true");
        clearInterval(storyTimer);
      }

      document.querySelectorAll("[data-highlight]").forEach((button) => {
        button.addEventListener("click", () => startStory(button.dataset.highlight));
      });
      viewer.querySelector(".story-close").addEventListener("click", closeStory);
      viewer.addEventListener("click", (event) => {
        if (event.target === viewer) closeStory();
      });
    </script>
